<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Add Ninja</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Segoe UI', sans-serif;
            background:#f4f7fc;
            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            padding:30px;
        }

        h1{
            color:#1f2937;
            margin-bottom:25px;
        }

        .form-container{
            width:100%;
            max-width:550px;
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
        }

        form{
            display:flex;
            flex-direction:column;
            gap:15px;
        }

        label{
            font-weight:600;
            color:#374151;
        }

        input{
            padding:12px 15px;
            border:2px solid #e5e7eb;
            border-radius:10px;
            font-size:1rem;
            transition:.3s;
        }

        input:focus{
            outline:none;
            border-color:#2563eb;
            box-shadow:0 0 10px rgba(37,99,235,.2);
        }

        button{
            margin-top:10px;
            padding:14px;
            border:none;
            border-radius:10px;
            background:linear-gradient(135deg,#2563eb,#1d4ed8);
            color:white;
            font-size:1rem;
            font-weight:600;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            transform:translateY(-2px);
        }

        .message{
            background:#dcfce7;
            color:#166534;
            border:1px solid #86efac;
            padding:12px;
            border-radius:10px;
            margin-bottom:20px;
            text-align:center;
        }

        .back-link{
            display:block;
            text-align:center;
            margin-top:20px;
            text-decoration:none;
            color:#2563eb;
            font-weight:600;
            transition:.3s;
        }

        .back-link:hover{
            color:#1d4ed8;
        }

        @media(max-width:600px){
            .form-container{
                padding:25px;
            }
        }
    </style>
</head>
<body>
<h1>Add new Ninja</h1>
<div class="form-container">
    <div th:if="${message}" class="message" th:text="${message}"></div>
    <form th:action="@{/ninjas/ui/save}" th:object="${ninja}" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" th:field="*{name}" required/>

        <label for="email">Email:</label>
        <input type="text" id="email" th:field="*{email}" required/>

        <label for="imgUrl">Image URL:</label>
        <input type="text" id="imgUrl" th:field="*{imgUrl}" required/>

        <label for="age">Age:</label>
        <input type="text" id="age" th:field="*{age}" required/>

        <label for="rank">Rank:</label>
        <input type="text" id="rank" th:field="*{rank}"/>

        <button type="submit">Register Ninja</button>
    </form>
    <a th:href="@{/ninjas/ui/list}" class="back-link">
        <- Back to the list of ninjas
    </a>
</div>
</body>
</html>
