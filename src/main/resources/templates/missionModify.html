<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modify Mission</title>

    <style>
        body{
            font-family:'Segoe UI',sans-serif;
            background:#f4f7fc;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:100%;
            max-width:600px;
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,.1);
        }

        form{
            display:flex;
            flex-direction:column;
            gap:15px;
        }

        input{
            padding:12px;
            border:2px solid #e5e7eb;
            border-radius:10px;
        }

        button{
            padding:14px;
            border:none;
            border-radius:10px;
            background:#f59e0b;
            color:white;
            font-weight:600;
            cursor:pointer;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Modify Mission</h1>

    <form th:action="@{/missions/ui/save/{id}(id=${mission.id})}"
          th:object="${mission}"
          method="post">

        <input type="hidden" name="_method" value="PUT">

        <label>Name</label>
        <input type="text" th:field="*{name}" required>

        <label>Difficulty</label>
        <input type="text" th:field="*{difficulty}" required>

        <button type="submit">
            Save Changes
        </button>

    </form>

</div>

</body>
</html>
