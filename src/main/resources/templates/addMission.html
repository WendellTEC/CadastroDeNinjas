<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Mission</title>

    <style>
        *{margin:0;padding:0;box-sizing:border-box;}

        body{
            font-family:'Segoe UI',sans-serif;
            background:#f4f7fc;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        .container{
            width:100%;
            max-width:600px;
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.1);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
        }

        form{
            display:flex;
            flex-direction:column;
            gap:15px;
        }

        label{
            font-weight:600;
        }

        input{
            padding:12px;
            border:2px solid #e5e7eb;
            border-radius:10px;
        }

        input:focus{
            outline:none;
            border-color:#2563eb;
        }

        button{
            padding:14px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
            font-weight:600;
            cursor:pointer;
        }

        .back-link{
            display:block;
            text-align:center;
            margin-top:20px;
            text-decoration:none;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Add Mission</h1>

    <form th:action="@{/missions/ui/save}"
          th:object="${mission}"
          method="post">

        <label>Name</label>
        <input type="text" th:field="*{name}" required>

        <label>Difficulty</label>
        <input type="text" th:field="*{difficulty}" required>

        <button type="submit">
            Register Mission
        </button>

    </form>

    <a th:href="@{/missions/ui/list}" class="back-link">
        ← Back to Missions
    </a>

</div>

</body>
</html>
